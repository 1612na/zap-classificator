<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsApp QR Code</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    h1 { font-size: 1.25rem; color: #111; margin-bottom: 8px; }
    p.sub { font-size: .875rem; color: #666; margin-bottom: 28px; }
    #qr-container { display: flex; justify-content: center; margin-bottom: 24px; min-height: 260px; align-items: center; }
    #qr-container canvas, #qr-container img { border-radius: 8px; }
    #status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: .8rem;
      color: #555;
      padding: 6px 14px;
      border-radius: 20px;
      background: #f0f0f0;
    }
    #status.connected { background: #d4edda; color: #155724; }
    #status.pending { background: #fff3cd; color: #856404; }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .connected .dot { animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  </style>
</head>
<body>
  <div class="card">
    <h1>Conectar WhatsApp</h1>
    <p class="sub">Abra o WhatsApp no celular &rarr; Dispositivos conectados &rarr; Conectar dispositivo</p>
    <div id="qr-container"><p style="color:#999;font-size:.875rem">Aguardando QR code…</p></div>
    <span id="status" class="pending"><span class="dot"></span><span id="status-text">Aguardando conexão</span></span>
  </div>

  <script>
    let qrInstance = null;
    let lastQr = null;

    async function poll() {
      try {
        const res = await fetch('/auth/qr');
        const data = await res.json();
        const container = document.getElementById('qr-container');
        const statusEl = document.getElementById('status');
        const statusText = document.getElementById('status-text');

        if (data.status === 'connected') {
          statusEl.className = 'connected';
          statusText.textContent = 'WhatsApp conectado!';
          container.innerHTML = '<p style="font-size:2rem">&#10003;</p><p style="color:#155724;margin-top:8px">Conectado com sucesso</p>';
          return; // stop polling
        }

        if (data.qr && data.qr !== lastQr) {
          lastQr = data.qr;
          container.innerHTML = '';
          qrInstance = new QRCode(container, {
            text: data.qr,
            width: 256,
            height: 256,
            correctLevel: QRCode.CorrectLevel.M,
          });
          statusEl.className = 'pending';
          statusText.textContent = 'Escaneie o QR code';
        }
      } catch (_) {
        // server may still be starting up
      }
      setTimeout(poll, 2000);
    }

    poll();
  </script>
</body>
</html>
