<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>zap-classificator — Dashboard</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      background: #f0f2f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ---- layout ---- */
    #root { display: flex; flex-direction: column; min-height: 100vh; }

    .header {
      background: #1a1a2e;
      color: #fff;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .header h1 { font-size: 18px; font-weight: 700; white-space: nowrap; }

    .stats-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      flex: 1;
    }
    .stat-chip {
      background: rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      white-space: nowrap;
    }
    .stat-chip strong { font-weight: 700; }

    .header-actions { display: flex; gap: 8px; align-items: center; }

    .main { display: flex; flex: 1; overflow: hidden; }

    .sidebar {
      width: 260px;
      min-width: 220px;
      background: #fff;
      border-right: 1px solid #ddd;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .sidebar h2 { font-size: 13px; text-transform: uppercase; color: #666; letter-spacing: .5px; }

    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-group label { font-size: 12px; color: #555; }
    .filter-group select,
    .filter-group input {
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      width: 100%;
      background: #fafafa;
    }

    .content { flex: 1; overflow-y: auto; padding: 16px; }

    /* ---- table ---- */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    thead { background: #f5f5f5; }
    th, td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid #eee;
      font-size: 13px;
      vertical-align: middle;
    }
    th { font-weight: 600; color: #444; font-size: 12px; text-transform: uppercase; letter-spacing: .4px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }

    /* ---- status badges ---- */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .3px;
    }
    .badge-lead_quente    { background: #d4edda; color: #155724; }
    .badge-lead_frio      { background: #e2e3e5; color: #383d41; }
    .badge-cliente_ativo  { background: #cce5ff; color: #004085; }
    .badge-suporte        { background: #f8d7da; color: #721c24; }
    .badge-encerrado      { background: #efefef; color: #888; }
    .badge-indefinido     { background: #fff3cd; color: #856404; }

    .priority-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 4px;
    }
    .p1 { background: #dc3545; }
    .p2 { background: #fd7e14; }
    .p3 { background: #28a745; }

    /* ---- buttons ---- */
    .btn {
      padding: 7px 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: opacity .15s;
    }
    .btn:disabled { opacity: .5; cursor: default; }
    .btn:hover:not(:disabled) { opacity: .85; }
    .btn-primary   { background: #0d6efd; color: #fff; }
    .btn-secondary { background: #6c757d; color: #fff; }
    .btn-success   { background: #198754; color: #fff; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* ---- pagination ---- */
    .pagination {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      align-items: center;
      margin-top: 12px;
      font-size: 13px;
      color: #555;
    }

    /* ---- modal overlay ---- */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 100;
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
    }
    .drawer {
      width: 560px;
      max-width: 95vw;
      height: 100vh;
      background: #fff;
      overflow-y: auto;
      box-shadow: -4px 0 24px rgba(0,0,0,.15);
      display: flex;
      flex-direction: column;
    }
    .drawer-header {
      padding: 16px 20px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 1;
    }
    .drawer-header h2 { font-size: 15px; }
    .drawer-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 20px; }

    /* ---- messages ---- */
    .msg-list { display: flex; flex-direction: column; gap: 6px; max-height: 280px; overflow-y: auto; }
    .msg-bubble {
      padding: 6px 10px;
      border-radius: 8px;
      max-width: 82%;
      font-size: 13px;
      line-height: 1.4;
    }
    .msg-bubble.from-me  { background: #dcf8c6; align-self: flex-end; }
    .msg-bubble.from-them { background: #f0f0f0; align-self: flex-start; }
    .msg-meta { font-size: 11px; color: #888; margin-top: 2px; }

    /* ---- classification form ---- */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-grid .full { grid-column: 1/-1; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 12px; color: #555; font-weight: 500; }
    .form-group select,
    .form-group textarea,
    .form-group input {
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      width: 100%;
    }
    .form-group textarea { resize: vertical; min-height: 56px; }

    /* ---- history ---- */
    .history-item {
      border: 1px solid #eee;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 12px;
    }
    .history-item + .history-item { margin-top: 6px; }
    .history-meta { color: #888; margin-bottom: 4px; }

    /* ---- misc ---- */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      border-bottom: 1px solid #eee;
      padding-bottom: 6px;
    }
    .empty { color: #999; text-align: center; padding: 32px; font-size: 13px; }
    .error-banner {
      background: #f8d7da;
      color: #721c24;
      padding: 10px 14px;
      border-radius: 4px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .loading { color: #888; text-align: center; padding: 24px; }
    .close-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #666;
      line-height: 1;
    }
    .close-btn:hover { color: #000; }

    .sync-status {
      font-size: 12px;
      color: #aaa;
    }

    .text-muted { color: #888; font-style: italic; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="app.js"></script>
</body>
</html>
